<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Yuuna Jarme" />
  <meta name="revised" content="2026-03-31" />
  <style>
    body { font-family: Arial, sans-serif; }
    
    .header, .footer {
      background: lightblue;
      padding: 10px;
    }

    /* Step 2: Fixed Footer */
    .footer {
       opacity: 0.5;
       position: fixed; 
       bottom: 0; 
       width: 100%;
    }

    /* Step 1: Relative Sidebar */
    .sidebar {
      background: lightgreen;
      width: 150px;
      height: 200px;
      position: relative; 
      top: 20px; 
      left: 20px;
    }

    /* Step 3: Absolute Content */
    .content {
      background: lightyellow;
      width: 300px;
      height: 200px;
      position: absolute; 
      top: 66px; 
      left: 200px;
      z-index: 1;
    }

    /* Step 4: Absolute Notice */
    .notice {
      position: absolute;
      top: 60px;
      left: 400px;
      background: orange;
      padding: 10px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Main Content</div>
  <div class="notice">Notice!</div>
  <div class="footer">Footer</div>
</body>
</html>
