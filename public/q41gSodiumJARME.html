<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Exercise 1 - Movie CRUD (Updated)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 20px; }
        form { text-align: left; }

        label {
            display: block;
            font-weight: bold;
            margin: 10px 0 5px;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; 
        }

        .star-rating {
            font-size: 30px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .star {
            color: #ccc;
            transition: color 0.2s;
        }

        .star.selected {
            color: #ffcc00; 
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #0056b3; }

        .delete-btn {
            background-color: #dc3545;
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            margin-left: 10px;
            display: inline-block;
        }

        .delete-btn:hover { background-color: #a71d2a; }

        hr { margin: 30px 0; border: 0; border-top: 1px solid #eee; }

        .movie-item {
            background: #f9f9f9;
            border: 1px solid #eee;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-stars { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add/Update a Movie</h2>
        
        <form id="movieForm">
            <label for="title">Title:</label>
            <input type="text" id="title" placeholder="Enter movie title" required>

            <label for="year">Year:</label>
            <input type="number" id="year" placeholder="e.g. 2024" required>

            <label for="genre">Genre:</label>
            <select id="genre">
                <option value="Romance">Romance</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
                <option value="Sci-Fi">Sci-Fi</option>
            </select>

            <label>Rating:</label>
            <div id="starContainer" class="star-rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>

            <button type="submit">Submit Movie</button>
        </form>

        <hr>

        <h2>Movie List</h2>
        <div id="movieList"></div>
    </div>

    <script>
        let selectedRating = 0;
        const stars = document.querySelectorAll('.star');
        const movieForm = document.getElementById('movieForm');
        const movieList = document.getElementById('movieList');


        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.getAttribute('data-value'));
                updateStars(selectedRating);
            });
        });

        function updateStars(rating) {
            stars.forEach(s => {
                s.classList.toggle('selected', s.getAttribute('data-value') <= rating);
            });
        }


        movieForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const titleInput = document.getElementById('title').value.trim();
            const yearInput = document.getElementById('year').value;
            const genreInput = document.getElementById('genre').value;
            const ratingInput = selectedRating || 0;

            let storedMovies = JSON.parse(localStorage.getItem('movies')) || [];
            
    
            const existingIndex = storedMovies.findIndex(m => m.title.toLowerCase() === titleInput.toLowerCase());

            if (existingIndex !== -1) {
          
                const existingMovie = storedMovies[existingIndex];
                
        
                const newAverage = (parseFloat(existingMovie.rating) + ratingInput) / 2;
                
                storedMovies[existingIndex] = {
                    title: existingMovie.title, 
                    year: yearInput,
                    genre: genreInput,
                    rating: newAverage.toFixed(1) 
                };
            } else {
 
                storedMovies.push({
                    title: titleInput,
                    year: yearInput,
                    genre: genreInput,
                    rating: ratingInput
                });
            }

            localStorage.setItem('movies', JSON.stringify(storedMovies));
            

            movieForm.reset();
            selectedRating = 0;
            updateStars(0);
            renderMovies();
        });


        function deleteMovie(index) {
            const storedMovies = JSON.parse(localStorage.getItem('movies')) || [];
            const movieTitle = storedMovies[index].title;

            if (confirm(`Are you sure you want to delete "${movieTitle}"?`)) {
                storedMovies.splice(index, 1);
                localStorage.setItem('movies', JSON.stringify(storedMovies));
                renderMovies(); 
            }
        }


        function renderMovies() {
            const storedMovies = JSON.parse(localStorage.getItem('movies')) || [];
            movieList.innerHTML = ''; 

            storedMovies.forEach((movie, index) => {
                const item = document.createElement('div');
                item.className = 'movie-item';
                

                let starDisplay = '';
                for(let i=1; i<=5; i++) {
                    
                    const color = i <= Math.round(movie.rating) ? '#ffcc00' : '#ccc';
                    starDisplay += `<span style="color: ${color}">★</span>`;
                }

                item.innerHTML = `
                    <div>
                        <strong>${movie.title} (${movie.year})</strong><br>
                        <small>${movie.genre} | Avg Rating: ${movie.rating}</small> ${starDisplay}
                    </div>
                    <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
                `;
                movieList.appendChild(item);
            });
        }

        renderMovies();
    </script>
</body>
</html>
